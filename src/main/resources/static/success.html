<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Submitted | Advocate Amrendra Singh</title>
    <!-- Importing Premium Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Classic Black & White Legal Theme */
        :root {
            --primary-color: #000000;
            --secondary-color: #333333;
            --bg-color: #f4f4f4;
            --text-color: #111111;
        }

        body { 
            font-family: 'Open Sans', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color);
            text-align: center; 
            padding-top: 12vh; 
            margin: 0;
        }

        .container { 
            max-width: 550px; 
            margin: auto; 
            background: #ffffff; 
            padding: 50px 40px; 
            border-radius: 2px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.08); 
            border-top: 5px solid var(--primary-color);
        }

        h2 { 
            font-family: 'Playfair Display', serif; 
            color: var(--primary-color); 
            font-size: 2rem;
            margin-top: 0;
            margin-bottom: 15px;
        }

        p {
            color: #444444;
            line-height: 1.6;
            font-size: 1.05rem;
            margin-bottom: 35px;
        }

        .btn { 
            display: inline-block; 
            padding: 14px 28px; 
            background-color: var(--primary-color); 
            color: white; 
            text-decoration: none; 
            font-weight: 600;
            border-radius: 2px; 
            transition: all 0.3s ease;
        }

        .btn:hover { 
            background-color: var(--secondary-color); 
            transform: translateY(-1px); 
        }
        
        .checkmark {
            font-size: 3.5rem;
            color: var(--primary-color);
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="checkmark">✓</div>
        <h2>Request Successfully Sent</h2>
        <p>Thank you. Your case summary and contact details have been securely transmitted to Chamber F-314. Advocate Amrendra Singh's office will review the information and contact you shortly to schedule your consultation.</p>
        <a href="/" class="btn">Return to Homepage</a>
    </div>
</body>
</html>
