<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Gateway</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>

    <h2>Consultation Fee: ₹799</h2>
    <button id="rzp-button1">Pay Now</button>

    <script>
        // Extract the caseId from the URL (e.g., payment.html?caseId=5)
        const urlParams = new URLSearchParams(window.location.search);
        const caseId = urlParams.get('caseId');

        document.getElementById('rzp-button1').onclick = function(e){
            e.preventDefault(); 

            fetch('/api/payment/create-order', {
                method: 'POST'
            })
            .then(response => response.json())
            .then(order => {
                
                var options = {
                    "key": "rzp_test_SvvI66tE5b3jL2", // Public test key is safe here
                    "amount": "79900", 
                    "currency": "INR",
                    "name": "Advocate Chamber",
                    "description": "Consultation Fee",
                    "order_id": order.id, 
                    "handler": function (response){
                        
                        // NEW: Send success status and caseId back to server to send email
                        fetch('/api/payment/verify', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                caseId: caseId,
                                paymentId: response.razorpay_payment_id
                            })
                        }).then(() => {
                            alert("Payment Successful! Payment ID: " + response.razorpay_payment_id);
                            window.location.href = "/";
                        });

                    },
                    "theme": {
                        "color": "#3399cc" 
                    }
                };
                
                var rzp1 = new Razorpay(options);
                rzp1.open();
                
            })
            .catch(error => {
                console.error("Error creating order:", error);
                alert("Could not connect to the payment server. Please try again.");
            });
        }
    </script>
</body>
</html>
