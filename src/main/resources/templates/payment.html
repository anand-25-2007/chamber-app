<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Gateway</title>
    <!-- 1. This script from Razorpay is required to make the popup appear -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>

    <h2>Consultation Fee: ₹799</h2>
    <!-- Make sure the button has this exact ID so the JavaScript can find it -->
    <button id="rzp-button1">Pay Now</button>

    <script>
        document.getElementById('rzp-button1').onclick = function(e){
            e.preventDefault(); // Prevents the button from refreshing the page

            // 2. Ask our Spring Boot Java backend to create the order
            fetch('/api/payment/create-order', {
                method: 'POST'
            })
            .then(response => response.json())
            .then(order => {
                
                // 3. Setup Razorpay options using the Order ID we just got from Java
                var options = {
                    "key": "rzp_test_SvvI66tE5b3jL2", // Your test key
                    "amount": "79900", // 79900 paise = ₹799
                    "currency": "INR",
                    "name": "Advocate Chamber",
                    "description": "Consultation Fee",
                    "order_id": order.id, // The ID dynamically generated by your backend!
                    "handler": function (response){
                        // 5. What happens when payment is successful
                        alert("Payment Successful! Payment ID: " + response.razorpay_payment_id);
                        // Optional: Redirect back to home page after success
                        window.location.href = "/";
                    },
                    "theme": {
                        "color": "#3399cc" // The color of the Razorpay popup
                    }
                };
                
                // 4. Open the Razorpay popup on the screen
                var rzp1 = new Razorpay(options);
                rzp1.open();
                
            })
            .catch(error => {
                console.error("Error creating order:", error);
                alert("Could not connect to the payment server. Please try again.");
            });
        }
    </script>
</body>
</html>
